<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>北美物流报价器</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --ink: #18202a;
      --muted: #687382;
      --line: #dce3ea;
      --brand: #126b5c;
      --brand-dark: #0b4f44;
      --accent: #d87828;
      --soft: #edf5f2;
      --warning: #fff6e8;
      --shadow: 0 18px 45px rgba(28, 39, 49, 0.10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, #eef3f5 0%, var(--bg) 38%),
        var(--bg);
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 44px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: var(--radius);
      color: #fff;
      background: var(--brand);
      font-weight: 800;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .config-note {
      color: var(--brand-dark);
      background: var(--soft);
      border: 1px solid #cce1dc;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 410px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .form-panel {
      padding: 22px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .section-title h2 {
      font-size: 18px;
    }

    .status-pill {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--brand-dark);
      background: var(--soft);
      font-size: 12px;
      font-weight: 700;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #34404b;
      font-size: 13px;
      font-weight: 700;
    }

    select,
    input[type="text"],
    input[type="number"] {
      width: 100%;
      height: 44px;
      border: 1px solid #cbd5df;
      border-radius: var(--radius);
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    select:focus,
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(18, 107, 92, 0.14);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 54px;
      border: 1px solid #d8e0e8;
      border-radius: var(--radius);
      padding: 12px;
      background: #fbfcfd;
    }

    .toggle-copy strong {
      display: block;
      font-size: 14px;
    }

    .toggle-copy span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .switch {
      position: relative;
      display: inline-flex;
      width: 48px;
      height: 28px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: #b7c1cc;
      border-radius: 999px;
      transition: 0.18s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      transition: 0.18s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
    }

    .switch input:checked + .slider {
      background: var(--brand);
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 20px;
    }

    .primary,
    .ghost {
      height: 44px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 800;
    }

    .primary {
      border: 0;
      color: #fff;
      background: var(--brand);
    }

    .primary:hover {
      background: var(--brand-dark);
    }

    .ghost {
      border: 1px solid #cbd5df;
      color: #33404c;
      background: #fff;
      padding: 0 16px;
    }

    .error {
      min-height: 20px;
      margin-top: 12px;
      color: #b33a2d;
      font-size: 13px;
      font-weight: 700;
    }

    .results {
      display: grid;
      gap: 18px;
    }

    .quote-panel {
      overflow: hidden;
    }

    .quote-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px;
      border-bottom: 1px solid var(--line);
    }

    .quote-head h2 {
      font-size: 18px;
    }

    .route-line {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .quote-type {
      color: #fff;
      background: var(--accent);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--line);
    }

    .metric {
      min-height: 132px;
      background: #fff;
      padding: 22px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin-top: 12px;
      font-size: 34px;
      line-height: 1;
    }

    .metric small {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .details {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }

    .detail-panel {
      padding: 20px;
      box-shadow: none;
    }

    .detail-panel h3 {
      margin-bottom: 14px;
      font-size: 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 0;
      border-top: 1px solid #edf1f4;
      color: #35414d;
      font-size: 14px;
    }

    .detail-row:first-of-type {
      border-top: 0;
    }

    .detail-row span:last-child {
      text-align: right;
      font-weight: 800;
    }

    .internal {
      background: #fffdfa;
      border-color: #f1dcc2;
    }

    .internal h3 {
      color: #8a4a0f;
    }

    .empty-state {
      padding: 42px 24px;
      color: var(--muted);
      text-align: center;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 18px;
    }

    @media (max-width: 860px) {
      header,
      .layout,
      .details {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
        align-items: start;
      }

      .config-note {
        white-space: normal;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 22px, 1180px);
        padding-top: 18px;
      }

      .brand {
        align-items: flex-start;
      }

      h1 {
        font-size: 23px;
      }

      .quote-head,
      .metric-grid {
        grid-template-columns: 1fr;
      }

      .quote-head {
        display: grid;
      }

      .metric {
        min-height: 112px;
      }

      .metric strong {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand">
        <div class="mark">NA</div>
        <div>
          <h1>北美物流报价器</h1>
          <p class="subtitle">仓到仓 / 全程配送单页报价工具</p>
        </div>
      </div>
      <div class="config-note">北美货运 · 在线报价系统</div>
    </header>

    <section class="layout">
      <form class="panel form-panel" id="quoteForm">
        <div class="section-title">
          <h2>报价输入</h2>
          <span class="status-pill">即时计算</span>
        </div>

        <div class="field">
          <label for="warehouse">起始仓库</label>
          <select id="warehouse" required>
            <option value="LA01">LA01 - Los Angeles</option>
            <option value="LA15">LA15 - Los Angeles</option>
            <option value="HOU4">HOU4 - Houston</option>
            <option value="HOU6">HOU6 - Houston</option>
            <option value="NJ7">NJ7 - New Jersey</option>
            <option value="NJ4">NJ4 - New Jersey</option>
            <option value="PA2">PA2 - Pennsylvania</option>
          </select>
        </div>

        <div class="field">
          <label for="zip">目的地邮编</label>
          <input id="zip" type="text" inputmode="numeric" maxlength="5" placeholder="例如 75201" required>
        </div>

        <div class="field">
          <label for="pallets">板数</label>
          <input id="pallets" type="number" min="1" step="1" value="1" required>
        </div>

        <div class="toggle-row">
          <div class="toggle-copy">
            <strong>包含 last mile</strong>
            <span>开启后按全程报价计算</span>
          </div>
          <label class="switch" aria-label="是否包含 last mile">
            <input id="lastMile" type="checkbox" checked>
            <span class="slider"></span>
          </label>
        </div>

        <div class="button-row">
          <button class="primary" type="submit">计算报价</button>
          <button class="ghost" type="button" id="resetBtn">重置</button>
        </div>
        <div class="error" id="error" aria-live="polite"></div>
      </form>

      <div class="results" id="results">
        <section class="panel quote-panel">
          <div class="empty-state">
            <strong>输入目的地邮编后生成报价</strong>
            <p>系统会自动判断起始仓区域、目的地区域和对应线路成本。</p>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const CONFIG = {
      palletsPerTruck: 150,
      costPerMile: 3,
      lastMilePerPallet: 130,
      profitPerPallet: 40
    };

    const WAREHOUSES = {
      LA01: { city: "Los Angeles", region: "west", market: "LA" },
      LA15: { city: "Los Angeles", region: "west", market: "LA" },
      HOU4: { city: "Houston", region: "central", market: "TX" },
      HOU6: { city: "Houston", region: "central", market: "TX" },
      NJ7: { city: "New Jersey", region: "east", market: "NJ_PA" },
      NJ4: { city: "New Jersey", region: "east", market: "NJ_PA" },
      PA2: { city: "Pennsylvania", region: "east", market: "NJ_PA" }
    };

    const REGION_LABELS = {
      west: "美西",
      central: "美中",
      east: "美东"
    };

    const ROUTE_COSTS = {
      "LA:NJ_PA": { truckCost: 11000, basis: "LA ↔ NJ 固定 $11,000/车" },
      "LA:TX": { truckCost: 1500 * CONFIG.costPerMile, basis: "LA ↔ TX 约 1500 miles × $3/mile" },
      "NJ_PA:TX": { truckCost: 1600 * CONFIG.costPerMile, basis: "TX ↔ NJ/PA 约 1600 miles × $3/mile" }
    };

    const form = document.getElementById("quoteForm");
    const warehouseInput = document.getElementById("warehouse");
    const zipInput = document.getElementById("zip");
    const palletsInput = document.getElementById("pallets");
    const lastMileInput = document.getElementById("lastMile");
    const results = document.getElementById("results");
    const error = document.getElementById("error");
    const resetBtn = document.getElementById("resetBtn");

    function money(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value);
    }

    function getDestinationRegion(zip) {
      const numericZip = Number(zip);

      if (numericZip >= 80000 && numericZip <= 99999) return "west";
      if (numericZip >= 50000 && numericZip <= 79999) return "central";
      if (numericZip >= 1 && numericZip <= 49999) return "east";

      return null;
    }

    function marketForRegion(region) {
      if (region === "west") return "LA";
      if (region === "central") return "TX";
      return "NJ_PA";
    }

    function routeKey(originMarket, destinationMarket) {
      return [originMarket, destinationMarket].sort().join(":");
    }

    function validateInputs(zip, pallets) {
      if (!/^\d{5}$/.test(zip)) {
        return "请输入 5 位美国邮编。";
      }

      if (!Number.isInteger(pallets) || pallets < 1) {
        return "板数必须是大于 0 的整数。";
      }

      if (!getDestinationRegion(zip)) {
        return "邮编不在可报价范围内。";
      }

      return "";
    }

    function calculateQuote() {
      const warehouseCode = warehouseInput.value;
      const zip = zipInput.value.trim();
      const pallets = Number(palletsInput.value);
      const hasLastMile = lastMileInput.checked;
      const message = validateInputs(zip, pallets);

      if (message) {
        error.textContent = message;
        return;
      }

      error.textContent = "";

      const warehouse = WAREHOUSES[warehouseCode];
      const destinationRegion = getDestinationRegion(zip);
      const destinationMarket = marketForRegion(destinationRegion);
      const sameRegion = warehouse.region === destinationRegion;

      let truckCost = 0;
      let routeBasis = "同区域，不计算大车成本";

      if (!sameRegion) {
        const route = ROUTE_COSTS[routeKey(warehouse.market, destinationMarket)];
        truckCost = route.truckCost;
        routeBasis = route.basis;
      }

      const linehaulPerPallet = truckCost / CONFIG.palletsPerTruck;
      const lastMilePerPallet = hasLastMile ? CONFIG.lastMilePerPallet : 0;
      const sellPerPallet = linehaulPerPallet + lastMilePerPallet + CONFIG.profitPerPallet;
      const total = sellPerPallet * pallets;
      const customerCostPerPallet = linehaulPerPallet + lastMilePerPallet;
      const totalCustomerVisibleCost = customerCostPerPallet * pallets;

      renderQuote({
        warehouseCode,
        warehouse,
        zip,
        pallets,
        hasLastMile,
        destinationRegion,
        sameRegion,
        truckCost,
        routeBasis,
        linehaulPerPallet,
        lastMilePerPallet,
        sellPerPallet,
        total,
        customerCostPerPallet,
        totalCustomerVisibleCost
      });
    }

    function renderQuote(quote) {
      const quoteType = quote.hasLastMile ? "全程报价" : "仓到仓报价";

      results.innerHTML = `
        <section class="panel quote-panel">
          <div class="quote-head">
            <div>
              <h2>客户报价</h2>
              <p class="route-line">${quote.warehouseCode}（${REGION_LABELS[quote.warehouse.region]}） → ${quote.zip}（${REGION_LABELS[quote.destinationRegion]}）</p>
            </div>
            <span class="quote-type">${quoteType}</span>
          </div>

          <div class="metric-grid">
            <div class="metric">
              <span>单板报价</span>
              <strong>${money(quote.sellPerPallet)}</strong>
              <small>已按当前线路自动计算</small>
            </div>
            <div class="metric">
              <span>总报价</span>
              <strong>${money(quote.total)}</strong>
              <small>${quote.pallets} 板 × ${money(quote.sellPerPallet)}/板</small>
            </div>
          </div>
        </section>

        <div class="details">
          <section class="panel detail-panel">
            <h3>客户报价区域</h3>
            <div class="detail-row">
              <span>报价类型</span>
              <span>${quoteType}</span>
            </div>
            <div class="detail-row">
              <span>单板报价</span>
              <span>${money(quote.sellPerPallet)}</span>
            </div>
            <div class="detail-row">
              <span>板数</span>
              <span>${quote.pallets}</span>
            </div>
            <div class="detail-row">
              <span>客户总价</span>
              <span>${money(quote.total)}</span>
            </div>
          </section>

        </div>
      `;
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      calculateQuote();
    });

    [warehouseInput, zipInput, palletsInput, lastMileInput].forEach(function (control) {
      control.addEventListener("input", function () {
        if (zipInput.value.trim() || palletsInput.value) {
          calculateQuote();
        }
      });
    });

    resetBtn.addEventListener("click", function () {
      form.reset();
      error.textContent = "";
      results.innerHTML = `
        <section class="panel quote-panel">
          <div class="empty-state">
            <strong>输入目的地邮编后生成报价</strong>
            <p>系统会自动判断起始仓区域、目的地区域和对应线路成本。</p>
          </div>
        </section>
      `;
    });
  </script>
</body>
</html>
